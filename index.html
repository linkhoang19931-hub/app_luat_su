<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Thi Luật Sư - Pro Dual View</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-width: 280px;
            --header-height: 60px;
            --footer-height: 70px;
            --bg: #f1f5f9;
            --text-main: #1e293b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        /* Dark Mode Variables */
        .dark-mode {
            --bg: #0f172a;
            --text-main: #f1f5f9;
            --card-bg: #1e293b;
            --border: #334155;
            --sidebar-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background 0.3s;
        }

        #app {
            display: grid;
            grid-template-columns: var(--sidebar-width) minmax(0, 1fr) minmax(0, 1.2fr);
            grid-template-rows: 100vh;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-height: 0; /* Quan trọng để scroll hoạt động */
        }
        .sidebar-header {
            padding: 15px 20px;
            border-bottom: 2px solid var(--bg);
            flex-shrink: 0;
        }
        .exam-list { flex: 1; overflow-y: auto; padding: 10px; }
        .exam-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .exam-item:hover { background: rgba(0,0,0,0.05); }
        .exam-item.active { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }

        /* Content Panel */
        .content-panel {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            min-width: 0;
            height: 100%;
        }
        .panel-header {
            flex-shrink: 0;
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            min-height: 0;
        }
        .q-card {
            max-width: 100%;
            margin: 0 auto;
        }
        .q-card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 10px 0;
        }
        .answer-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            border-left: 5px solid #10b981;
            display: none;
        }

        /* PDF Panel */
        .pdf-panel {
            background: #475569;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
            overflow-y: auto; /* Cho phép cuộn dọc khi có nhiều trang */
        }
        .pdf-panel iframe {
            width: 100%;
            min-height: 100%; /* Mỗi trang chiếm ít nhất 1 màn hình */
            border: none;
            flex-shrink: 0;
        }

        /* Footer */
        .footer {
            flex-shrink: 0;
            height: var(--footer-height);
            padding: 0 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-outline { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); }
        
        .progress-bar { width: 100px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: 0.3s; }

        /* Dark Mode Toggle */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Cột 1 -->
        <aside class="sidebar">
            <div class="sidebar-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:var(--primary)">⚖️ Ôn Thi Luật Sư</h2>
                <button class="theme-toggle" onclick="toggleDarkMode()" title="Chế độ ban đêm">🌙</button>
            </div>
            <div class="exam-list" id="examList"></div>
        </aside>

        <!-- Cột 2 -->
        <section class="content-panel">
            <header class="panel-header">
                <div id="examTitle" style="font-weight:700">Chọn đề thi...</div>
                <div style="display:flex; align-items:center; gap:10px">
                    <span id="qIndex" style="font-size:0.85rem">0/0</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
                </div>
            </header>
            
            <div class="scroll-area">
                <div id="qContent" class="q-card">
                    <div style="text-align:center; margin-top:100px; color:#94a3b8">
                        <h3>Trình song hành PDF</h3>
                        <p>Chọn đề thi bên trái. PDF sẽ tự động load đúng trang và fit màn hình.</p>
                    </div>
                </div>
                <div id="ansBox" class="answer-box q-card"></div>
            </div>

            <footer class="footer" id="footer" style="display:none">
                <button class="btn btn-outline" onclick="prevQ()" id="prevBtn">← Trước</button>
                <button class="btn btn-primary" onclick="toggleAns()" id="ansBtn">💡 Xem đáp án</button>
                <button class="btn btn-primary" onclick="nextQ()" id="nextBtn">Tiếp theo →</button>
            </footer>
        </section>

        <!-- Cột 3 -->
        <section class="pdf-panel">
            <iframe id="pdfViewer" src="about:blank"></iframe>
        </section>
    </div>

    <script>
        let exams = [];
        let curExamIdx = -1;
        let curQIdx = 0;

        // Tự động load dữ liệu
        fetch('./AppLuatSu/Resources/questions_data.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                exams = data;
                renderExams();
            });

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            btn.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Restore Dark Mode
        if (localStorage.getItem('darkMode') === 'true') toggleDarkMode();

        function renderExams() {
            const container = document.getElementById('examList');
            container.innerHTML = exams.map((ex, i) => `
                <div class="exam-item" id="ex-${i}" onclick="loadExam(${i})">
                    <div style="font-weight:600; font-size:0.9rem">${ex.title}</div>
                    <div style="font-size:0.75rem; color:#64748b">${ex.questions.length} câu hỏi</div>
                </div>
            `).join('');
        }

        function loadExam(i) {
            if (curExamIdx !== -1) {
                const prev = document.getElementById(`ex-${curExamIdx}`);
                if (prev) prev.classList.remove('active');
            }
            curExamIdx = i;
            document.getElementById(`ex-${i}`).classList.add('active');
            curQIdx = 0;
            document.getElementById('footer').style.display = 'flex';
            renderQuestion();
        }

        function renderQuestion() {
            const ex = exams[curExamIdx];
            const q = ex.questions[curQIdx];

            document.getElementById('examTitle').innerText = ex.title;
            document.getElementById('qIndex').innerText = `Câu ${curQIdx+1}/${ex.questions.length}`;
            document.getElementById('progress').style.width = `${((curQIdx+1)/ex.questions.length)*100}%`;
            
            document.getElementById('qContent').innerHTML = `
                <h2 style="margin-bottom:15px">${q.title}</h2>
                <div style="font-size:1.1rem; line-height:1.7">${marked.parse(q.content)}</div>
            `;
            
            document.getElementById('ansBox').innerHTML = `
                <h3 style="color:#10b981; margin-bottom:10px">🎯 Gợi ý giải:</h3>
                <div style="font-size:1.05rem">${marked.parse(q.answer_guideline)}</div>
            `;
            document.getElementById('ansBox').style.display = 'none';
            document.getElementById('ansBtn').innerText = "💡 Xem đáp án";

            // HIỂN THỊ NHIỀU TRANG PDF NẾU CÂU HỎI TRÀN TRANG
            const pdfContainer = document.querySelector('.pdf-panel');
            pdfContainer.innerHTML = ''; // Xóa các iframe cũ
            
            if (q.pdf_pages && q.pdf_pages.length > 0) {
                q.pdf_pages.forEach(pageFile => {
                    const iframe = document.createElement('iframe');
                    iframe.src = `./data/pages/${pageFile}#view=FitH&pagemode=none`;
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.borderBottom = '4px solid #1e293b'; // Ngăn cách giữa các trang
                    pdfContainer.appendChild(iframe);
                });
            } else if (q.pdf_page_file) {
                // Fallback cho dữ liệu cũ
                const iframe = document.createElement('iframe');
                iframe.src = `./data/pages/${q.pdf_page_file}#view=FitH&pagemode=none`;
                pdfContainer.appendChild(iframe);
            }

            document.getElementById('prevBtn').style.visibility = curQIdx > 0 ? 'visible' : 'hidden';
            document.getElementById('nextBtn').innerText = curQIdx === ex.questions.length-1 ? "Hoàn thành" : "Tiếp theo →";
            document.querySelector('.scroll-area').scrollTop = 0;
            pdfContainer.scrollTop = 0;
        }

        function toggleAns() {
            const box = document.getElementById('ansBox');
            const btn = document.getElementById('ansBtn');
            if (box.style.display === 'none') {
                box.style.display = 'block';
                btn.innerText = "🙈 Ẩn đáp án";
                box.scrollIntoView({behavior: 'smooth', block: 'start'});
            } else {
                box.style.display = 'none';
                btn.innerText = "💡 Xem đáp án";
            }
        }

        function nextQ() {
            if (curQIdx < exams[curExamIdx].questions.length - 1) {
                curQIdx++;
                renderQuestion();
            } else {
                alert("Hoàn thành bộ đề!");
            }
        }

        function prevQ() {
            if (curQIdx > 0) {
                curQIdx--;
                renderQuestion();
            }
        }
    </script>
</body>
</html>
