<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi Luật Sư - Web App</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-color: #1C1C1E;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid #D1D1D6;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .container {
            padding: 20px;
            flex: 1;
        }
        .progress-bar {
            height: 6px;
            background: #E5E5EA;
            border-radius: 3px;
            margin-bottom: 20px;
        }
        .progress-inner {
            height: 100%;
            background: var(--primary-color);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .question-box {
            margin-bottom: 30px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .option {
            background: var(--card-bg);
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .option:hover { border-color: var(--primary-color); }
        .option.selected { border-color: var(--primary-color); background: rgba(0, 122, 255, 0.05); }
        .option.correct { border-color: #34C759; background: rgba(52, 199, 89, 0.1); }
        .option.wrong { border-color: #FF3B30; background: rgba(255, 59, 48, 0.1); }
        
        .explanation {
            background: #F2F2F7;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .btn-next {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h2 id="title">Ôn Thi Luật Sư</h2>
        </header>
        <div class="container" id="content">
            <div class="progress-bar" style="display: none;"><div class="progress-inner" id="progress"></div></div>
            <div id="quiz-area">
                <div style="text-align: center; padding: 50px;">
                    <div class="spinner"></div>
                    <p style="color: #8E8E93; margin-top: 20px;">Đang tải 23 bộ đề thi thực tế...</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* Thêm hiệu ứng loading cho chuyên nghiệp */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        let exams = [];
        let currentExamIndex = 0;
        let currentQuestionIndex = 0;
        let isExamMode = false;

        // Tự động load dữ liệu khi trang web mở ra
        window.addEventListener('DOMContentLoaded', (event) => {
            console.log("Bắt đầu tải dữ liệu...");
            fetch('./AppLuatSu/Resources/questions_data.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    console.log("Đã tải xong:", data.length, "đề thi");
                    exams = data;
                    renderExamList();
                })
                .catch(error => {
                    console.error('Lỗi load dữ liệu:', error);
                    document.getElementById('quiz-area').innerHTML = `
                        <div style="text-align:center; padding:50px;">
                            <p style="color:red; font-weight:bold;">Không tìm thấy dữ liệu đề thi!</p>
                            <p style="font-size:0.9rem; color:#8E8E93;">Vui lòng kiểm tra file: AppLuatSu/Resources/questions_data.json</p>
                            <button onclick="location.reload()" class="btn-next" style="width:auto; padding:10px 20px;">Thử lại</button>
                        </div>
                    `;
                });
        });

        function renderExamList() {
            isExamMode = false;
            let html = `
                <h3 style="margin-bottom:20px;">Danh sách Đề thi (${exams.length} đề)</h3>
                <div style="display: grid; gap: 10px;">
                    ${exams.map((exam, index) => `
                        <div class="option" onclick="startExam(${index})">
                            <div style="flex:1">
                                <strong>${exam.title}</strong><br>
                                <small style="color:#8E8E93">${exam.date}</small>
                            </div>
                            <span style="color:var(--primary-color)">${exam.questions.length} câu ></span>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('quiz-area').innerHTML = html;
            document.getElementById('progress').parentElement.style.display = 'none';
        }

        function startExam(index) {
            currentExamIndex = index;
            currentQuestionIndex = 0;
            isExamMode = true;
            document.getElementById('progress').parentElement.style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const exam = exams[currentExamIndex];
            const q = exam.questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / exam.questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
            
            let html = `
                <div class="question-box">
                    <button onclick="renderExamList()" style="background:none; border:none; color:var(--primary-color); cursor:pointer; margin-bottom:10px; padding:0;">< Quay lại danh sách</button>
                    <p style="color: #8E8E93; margin-bottom: 5px;">${exam.title}</p>
                    <p style="color: #8E8E93; margin-bottom: 15px;">Câu ${currentQuestionIndex + 1} / ${exam.questions.length}</p>
                    <div class="question-text" style="white-space: pre-wrap;">${q.title}\n\n${q.content}</div>
                    
                    <div id="explanation" class="explanation" style="white-space: pre-wrap;">
                        <strong>Gợi ý đáp án / Hướng dẫn:</strong><br><br>
                        ${q.answer_guideline}
                        
                        <div style="margin-top: 20px; border-top: 1px solid #D1D1D6; padding-top: 15px;">
                            <p style="font-size: 0.9rem; color: #8E8E93;">Bạn có thể xem bản gốc (bảng điểm, bôi vàng) tại:</p>
                            <a href="./data/${q.pdf_file}#page=${q.page}" target="_blank" class="btn-next" style="display: block; text-decoration: none; text-align: center; background: #34C759; margin-top: 10px;">
                                📄 Mở PDF Gốc - Trang ${q.page}
                            </a>
                        </div>
                    </div>
                </div>
                <div style="position: sticky; bottom: 20px; background: white; padding-top: 10px;">
                    <button id="showAnsBtn" class="btn-next" onclick="showExplanation()" style="width: 100%;">Xem Đáp Án Gợi Ý</button>
                    <div id="navBtns" style="display: none; display: flex; gap: 10px;">
                        ${currentQuestionIndex > 0 ? `<button class="btn-next" onclick="prevQuestion()" style="flex:1; background:#8E8E93;">Câu Trước</button>` : ''}
                        <button class="btn-next" onclick="nextQuestion()" style="flex:2;">${currentQuestionIndex + 1 < exam.questions.length ? 'Câu Tiếp Theo' : 'Hoàn Thành Đề'}</button>
                    </div>
                </div>
            `;
            document.getElementById('quiz-area').innerHTML = html;
        }

        function showExplanation() {
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('navBtns').style.display = 'flex';
            document.getElementById('showAnsBtn').style.display = 'none';
        }

        function nextQuestion() {
            const exam = exams[currentExamIndex];
            if (currentQuestionIndex < exam.questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                alert("Bạn đã hoàn thành bộ đề này!");
                renderExamList();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }
    </script>
</body>
</html>
