<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Exam Pro - Apple Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --apple-bg: #ffffff;
            --apple-secondary-bg: #f5f5f7;
            --apple-text: #1d1d1f;
            --apple-secondary-text: #86868b;
            --apple-blue: #0066cc;
            --apple-border: rgba(0,0,0,0.1);
            --sidebar-width: 320px;
            --glass: rgba(255, 255, 255, 0.85);
        }

        .dark-mode {
            --apple-bg: #000000;
            --apple-secondary-bg: #1d1d1f;
            --apple-text: #f5f5f7;
            --apple-secondary-text: #a1a1a6;
            --apple-border: rgba(255,255,255,0.15);
            --glass: rgba(0, 0, 0, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #app {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr 1fr;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: var(--apple-secondary-bg);
            border-right: 1px solid var(--apple-border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: var(--sidebar-width);
        }
        .sidebar-header { padding: 40px 30px 20px 30px; flex-shrink: 0; }
        .sidebar-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        
        .exam-list { 
            flex: 1; 
            overflow-y: auto !important; 
            padding: 0 15px 30px 15px; 
            min-height: 0;
        }
        .year-header {
            font-size: 11px; font-weight: 700; color: var(--apple-secondary-text);
            padding: 24px 15px 8px 15px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .exam-item {
            padding: 14px 15px; border-radius: 12px; cursor: pointer;
            margin-bottom: 4px; transition: 0.2s;
        }
        .exam-item:hover { background: rgba(0,0,0,0.05); }
        .exam-item.active { background: var(--apple-text); color: var(--apple-bg); }

        /* --- CONTENT PANEL --- */
        .content-panel {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--apple-bg);
            border-right: 1px solid var(--apple-border);
            min-width: 0;
        }
        .panel-header {
            height: 70px; padding: 0 30px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
            background: var(--glass); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--apple-border); z-index: 10;
        }
        .scroll-area {
            flex: 1; 
            overflow-y: auto !important; 
            padding: 40px 30px;
            scroll-behavior: smooth; 
            min-height: 0;
        }
        .q-container { max-width: 650px; margin: 0 auto; padding-bottom: 40px; }
        .q-card h2 { font-size: 28px; font-weight: 700; margin-bottom: 25px; line-height: 1.3; letter-spacing: -0.5px;}
        .q-body { font-size: 18px; line-height: 1.6; }
        
        .answer-box {
            margin-top: 40px; padding: 30px; background: var(--apple-secondary-bg);
            border-radius: 20px; display: none;
            border: 1px solid var(--apple-border);
        }

        /* --- FOOTER --- */
        .footer {
            height: 90px; padding: 0 30px; flex-shrink: 0;
            background: var(--glass); backdrop-filter: saturate(180%) blur(20px);
            border-top: 1px solid var(--apple-border);
            display: flex; align-items: center; justify-content: space-between;
            z-index: 10;
        }

        /* --- PDF PANEL --- */
        .pdf-panel {
            background: var(--apple-secondary-bg);
            height: 100vh; 
            overflow-y: auto !important; 
            padding: 20px;
            min-width: 0;
        }
        .pdf-panel iframe {
            width: 100%; height: 90vh; border-radius: 16px; border: 1px solid var(--apple-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); margin-bottom: 20px; display: block;
        }

        /* --- BUTTONS --- */
        .btn {
            height: 46px; padding: 0 24px; border-radius: 23px; font-size: 15px;
            font-weight: 600; cursor: pointer; border: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--apple-blue); color: white; }
        .btn-primary:hover { transform: scale(1.03); filter: brightness(1.1); }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--apple-text); }
        .dark-mode .btn-secondary { background: rgba(255,255,255,0.1); }
        .btn-black { background: var(--apple-text); color: var(--apple-bg); }

        /* --- BONGO CAT (SVG - 100% STABLE) --- */
        .cat-container {
            position: fixed; bottom: 20px; left: 20px; z-index: 9999; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
        .bubble {
            background: var(--apple-text); color: var(--apple-bg); padding: 8px 16px;
            border-radius: 15px; font-size: 13px; font-weight: 600; margin-bottom: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            opacity: 1; /* Luôn hiển thị */
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
            position: relative;
        }
        /* Hiệu ứng nhấp nháy nhẹ khi đổi câu */
        .bubble.update {
            opacity: 0;
            transform: translateY(-5px);
        }
        
        /* SCROLLBARS (MAC STYLE) */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(0,0,0,0.2); 
            border-radius: 20px; 
            border: 3px solid transparent; 
            background-clip: content-box; 
        }
        .dark-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); }

        /* Utils */
        .progress-track { width: 120px; height: 4px; background: var(--apple-border); border-radius: 2px; }
        .progress-bar { height: 100%; background: var(--apple-text); border-radius: 2px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Law Exam</h2></div>
            <div class="exam-list" id="examList"></div>
        </aside>

        <section class="content-panel">
            <header class="panel-header">
                <div id="examTitle" style="font-size: 13px; font-weight: 600; opacity: 0.5;">Chọn đề thi</div>
                <div style="display:flex; align-items:center; gap:20px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span id="qIndex" style="font-size: 12px; font-weight: 700;">0 / 0</span>
                        <div class="progress-track"><div class="progress-bar" id="progress" style="width:0%"></div></div>
                    </div>
                    <button onclick="toggleDarkMode()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌙</button>
                </div>
            </header>

            <div class="scroll-area" id="mainScroll">
                <div class="q-container">
                    <div id="qContent">
                        <div style="text-align:center; padding-top:120px; opacity:0.2">
                            <h1 style="font-size:48px; letter-spacing:-2px">Ready to start?</h1>
                            <p style="font-size:18px">Chọn một bộ đề từ danh sách bên trái.</p>
                        </div>
                    </div>
                    <div id="ansBox" class="answer-box"></div>
                </div>
            </div>

            <footer class="footer" id="footer" style="display:none">
                <button class="btn btn-secondary" onclick="prevQ()" id="prevBtn">Trước</button>
                <button class="btn btn-black" onclick="toggleAns()" id="ansBtn">Xem đáp án</button>
                <button class="btn btn-primary" onclick="nextQ()" id="nextBtn">Tiếp theo</button>
            </footer>
        </section>

        <section class="pdf-panel" id="pdfPanel"></section>

        <!-- BONGO CAT SVG -->
        <div class="cat-container" onmousedown="bongoDown()" onmouseup="bongoUp()" onclick="meow()">
            <div class="bubble" id="catSpeech">Cố lên nhé! 🐾</div>
            <div id="bongo-cat-svg">
                <svg width="100" height="80" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 80C20 50 40 30 60 30C80 30 100 50 100 80H20Z" fill="white" stroke="#1d1d1f" stroke-width="4"/>
                    <path d="M35 35L25 20L45 30" fill="white" stroke="#1d1d1f" stroke-width="3"/>
                    <path d="M85 35L95 20L75 30" fill="white" stroke="#1d1d1f" stroke-width="3"/>
                    <circle cx="45" cy="50" r="3" fill="#1d1d1f"/>
                    <circle cx="75" cy="50" r="3" fill="#1d1d1f"/>
                    <path d="M55 60C55 60 58 65 60 65C62 65 65 60 65 60" stroke="#1d1d1f" stroke-width="2" stroke-linecap="round"/>
                    <path id="leftPaw" d="M25 65C15 65 5 75 5 85" stroke="#1d1d1f" stroke-width="6" stroke-linecap="round"/>
                    <path id="rightPaw" d="M95 65C105 65 115 75 115 85" stroke="#1d1d1f" stroke-width="6" stroke-linecap="round"/>
                    <path d="M0 85H120" stroke="#1d1d1f" stroke-width="4"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        let exams = [];
        let curExamIdx = -1;
        let curQIdx = 0;

        fetch('./AppLuatSu/Resources/questions_data.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => { exams = data; renderExams(); });

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('darkMode') === 'true') toggleDarkMode();

        function renderExams() {
            const container = document.getElementById('examList');
            const groups = {};
            exams.forEach((ex, i) => {
                if (!groups[ex.year]) groups[ex.year] = [];
                groups[ex.year].push({ ...ex, originalIdx: i });
            });
            const years = Object.keys(groups).sort((a,b) => (a === "Khác" ? 1 : b === "Khác" ? -1 : b - a));
            container.innerHTML = years.map(year => `
                <div class="year-header">${year}</div>
                ${groups[year].map(ex => `
                    <div class="exam-item" id="ex-${ex.originalIdx}" onclick="loadExam(${ex.originalIdx})">
                        <div style="font-weight:600; font-size:14px">${ex.title}</div>
                        <div style="opacity:0.4; font-size:11px; margin-top:2px">${ex.questions.length} câu hỏi</div>
                    </div>
                `).join('')}
            `).join('');
        }

        function loadExam(i) {
            if (curExamIdx !== -1) {
                const prev = document.getElementById(`ex-${curExamIdx}`);
                if(prev) prev.classList.remove('active');
            }
            curExamIdx = i;
            const current = document.getElementById(`ex-${i}`);
            if(current) current.classList.add('active');
            curQIdx = 0;
            document.getElementById('footer').style.display = 'flex';
            renderQuestion();
        }

        function renderQuestion() {
            const ex = exams[curExamIdx];
            const q = ex.questions[curQIdx];
            document.getElementById('examTitle').innerText = ex.title;
            document.getElementById('qIndex').innerText = `${curQIdx+1} / ${ex.questions.length}`;
            document.getElementById('progress').style.width = `${((curQIdx+1)/ex.questions.length)*100}%`;
            const content = document.getElementById('qContent');
            content.style.opacity = 0;
            setTimeout(() => {
                content.innerHTML = `<h2 style="margin-bottom:30px">${q.title}</h2><div class="q-body">${marked.parse(q.content)}</div>`;
                content.style.opacity = 1;
                document.getElementById('ansBox').innerHTML = `<div style="font-size:11px; font-weight:700; color:var(--apple-secondary-text); text-transform:uppercase; margin-bottom:15px; letter-spacing:1px">Giải thích chi tiết</div><div class="q-body" style="font-size:17px">${marked.parse(q.answer_guideline)}</div>`;
                document.getElementById('ansBox').style.display = 'none';
                document.getElementById('ansBtn').innerText = "Xem đáp án";
                renderPdfPages(q.pdf_pages);
                document.getElementById('prevBtn').style.visibility = curQIdx > 0 ? 'visible' : 'hidden';
                document.getElementById('mainScroll').scrollTop = 0;
            }, 150);
        }

        function toggleAns() {
            const box = document.getElementById('ansBox');
            const btn = document.getElementById('ansBtn');
            const q = exams[curExamIdx].questions[curQIdx];
            if (box.style.display === 'none') {
                box.style.display = 'block';
                btn.innerText = "Ẩn đáp án";
                renderPdfPages(q.ans_pdf_pages);
                setTimeout(() => box.scrollIntoView({behavior:'smooth', block:'start'}), 100);
            } else {
                box.style.display = 'none';
                btn.innerText = "Xem đáp án";
                renderPdfPages(q.pdf_pages);
            }
        }

        function renderPdfPages(pages) {
            const container = document.getElementById('pdfPanel');
            container.innerHTML = '';
            if (pages && pages.length > 0) {
                pages.forEach(p => {
                    const iframe = document.createElement('iframe');
                    iframe.src = `./data/pages/${p}#view=FitH&pagemode=none`;
                    container.appendChild(iframe);
                });
            }
            container.scrollTop = 0;
        }

        function nextQ() { if (curQIdx < exams[curExamIdx].questions.length-1) { curQIdx++; renderQuestion(); } }
        function prevQ() { if (curQIdx > 0) { curQIdx--; renderQuestion(); } }

        // BONGO CAT LOGIC
        function bongoDown() {
            document.getElementById('leftPaw').setAttribute('d', 'M25 80C15 80 5 85 5 85');
            document.getElementById('rightPaw').setAttribute('d', 'M95 80C105 80 115 85 115 85');
            document.getElementById('bongo-cat-svg').style.transform = 'scale(0.95) translateY(5px)';
        }
        function bongoUp() {
            document.getElementById('leftPaw').setAttribute('d', 'M25 65C15 65 5 75 5 85');
            document.getElementById('rightPaw').setAttribute('d', 'M95 65C105 65 115 75 115 85');
            document.getElementById('bongo-cat-svg').style.transform = 'scale(1) translateY(0)';
        }
        const cheers = ["Cố lên vợ ơi! 💖", "Luật sư tương lai! ⚖️", "Meow! Đập tay nào!", "Bạn làm tốt lắm! ✨", "Nghỉ tí không? ☕", "Câu này hơi khó nhỉ?", "Bạn sắp xong rồi đó!", "Học luật thật ngầu! 😎"];
        function meow() {
            const speech = document.getElementById('catSpeech');
            const bubble = speech.parentElement.querySelector('.bubble');
            
            // Hiệu ứng chuyển tiếp
            bubble.classList.add('update');
            
            setTimeout(() => {
                speech.innerText = cheers[Math.floor(Math.random() * cheers.length)];
                bubble.classList.remove('update');
            }, 500);
        }

        // Tự động "tám chuyện" mỗi 10 giây
        setInterval(meow, 10000);
        // Hiện câu đầu tiên ngay lập tức
        window.addEventListener('load', () => setTimeout(meow, 2000));
    </script>
</body>
</html>
