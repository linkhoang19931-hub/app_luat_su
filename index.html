<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi Luật Sư - Web App</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-color: #1C1C1E;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom: 1px solid #D1D1D6;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .container {
            padding: 20px;
            flex: 1;
        }
        .progress-bar {
            height: 6px;
            background: #E5E5EA;
            border-radius: 3px;
            margin-bottom: 20px;
        }
        .progress-inner {
            height: 100%;
            background: var(--primary-color);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .question-box {
            margin-bottom: 30px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .option {
            background: var(--card-bg);
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .option:hover { border-color: var(--primary-color); }
        .option.selected { border-color: var(--primary-color); background: rgba(0, 122, 255, 0.05); }
        .option.correct { border-color: #34C759; background: rgba(52, 199, 89, 0.1); }
        .option.wrong { border-color: #FF3B30; background: rgba(255, 59, 48, 0.1); }
        
        .explanation {
            background: #F2F2F7;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        .btn-next {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h2 id="title">Ôn Thi Luật Sư</h2>
        </header>
        <div class="container" id="content">
            <div class="progress-bar"><div class="progress-inner" id="progress"></div></div>
            <div id="quiz-area">
                <p style="text-align: center; color: #8E8E93;">Vui lòng upload dữ liệu OCR để bắt đầu học...</p>
                <div style="text-align: center; margin-top: 20px;">
                    <input type="file" id="fileInput" accept=".json" style="display: none;">
                    <button onclick="document.getElementById('fileInput').click()" class="btn-next" style="width: auto; padding: 10px 20px;">Import JSON Dữ liệu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                questions = JSON.parse(event.target.result);
                startQuiz();
            };
            reader.readAsText(file);
        });

        function startQuiz() {
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const progress = ((currentIndex + 1) / questions.count) * 100;
            document.getElementById('progress').style.width = progress + '%';
            
            let html = `
                <div class="question-box">
                    <p style="color: #8E8E93; margin-bottom: 10px;">Câu ${currentIndex + 1} / ${questions.length}</p>
                    <div class="question-text">${q.question || q.title || 'Đề bài tự luận'}</div>
                    <div id="options">
                        ${q.options ? Object.entries(q.options).map(([key, val]) => `
                            <div class="option" onclick="checkAnswer('${key}')" id="opt-${key}">
                                <strong style="margin-right: 10px;">${key}.</strong> ${val}
                            </div>
                        `).join('') : '<p><i>Đây là câu hỏi tự luận, hãy suy nghĩ câu trả lời trước khi xem đáp án.</i></p>'}
                    </div>
                    <div id="explanation" class="explanation">
                        <strong>Giải thích/Đáp án:</strong><br>
                        ${q.explanation || q.answer_detail || 'Đang cập nhật...'}
                    </div>
                </div>
                <button id="nextBtn" class="btn-next" onclick="nextQuestion()" style="display: none; width: 100%;">Câu Tiếp Theo</button>
                <button id="showAnsBtn" class="btn-next" onclick="showExplanation()" style="width: 100%;">${q.options ? 'Xem Giải Thích' : 'Xem Đáp Án Gợi Ý'}</button>
            `;
            document.getElementById('quiz-area').innerHTML = html;
        }

        function showExplanation() {
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('showAnsBtn').style.display = 'none';
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                alert("Chúc mừng! Bạn đã hoàn thành bộ đề.");
            }
        }
    </script>
</body>
</html>
