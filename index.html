<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Thi Luật Sư - Dual View Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-width: 300px;
            --header-height: 60px;
            --footer-height: 80px;
            --bg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            overflow: hidden;
        }

        /* Layout chính 3 cột */
        #app {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr 1.2fr;
            height: 100vh;
        }

        /* Cột 1: Sidebar danh sách đề */
        .sidebar {
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid var(--bg);
            background: #fff;
        }
        .exam-list { flex: 1; overflow-y: auto; padding: 10px; }
        .exam-item {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .exam-item:hover { background: #f8fafc; }
        .exam-item.active { background: #eff6ff; border: 1px solid #bfdbfe; }

        /* Cột 2: Nội dung câu hỏi (Text) */
        .content-panel {
            display: flex;
            flex-direction: column;
            background: #fff;
            border-right: 1px solid #e2e8f0;
        }
        .panel-header {
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            background: #fff;
            justify-content: space-between;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .q-card {
            max-width: 800px;
            margin: 0 auto;
        }
        .answer-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border-left: 5px solid #10b981;
            display: none;
        }

        /* Cột 3: Preview PDF */
        .pdf-panel {
            background: #475569;
            display: flex;
            flex-direction: column;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Footer điều hướng */
        .footer {
            height: var(--footer-height);
            padding: 0 30px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-outline { background: #fff; border: 1px solid #cbd5e1; }
        
        .progress-bar { width: 150px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: 0.3s; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Cột 1 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 style="color:var(--primary)">⚖️ Ôn Thi Luật Sư</h2>
                <p style="font-size:0.8rem; color:#64748b">Dữ liệu FDVN 2009-2024</p>
            </div>
            <div class="exam-list" id="examList"></div>
        </aside>

        <!-- Cột 2 -->
        <section class="content-panel">
            <header class="panel-header">
                <div id="examTitle" style="font-weight:700">Chọn đề thi...</div>
                <div style="display:flex; align-items:center; gap:10px">
                    <span id="qIndex" style="font-size:0.85rem">0/0</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
                </div>
            </header>
            
            <div class="scroll-area">
                <div id="qContent" class="q-card">
                    <div style="text-align:center; margin-top:100px; color:#94a3b8">
                        <h3>Màn hình chính</h3>
                        <p>Chọn một bộ đề thi ở bên trái để bắt đầu song hành cùng PDF gốc.</p>
                    </div>
                </div>
                <div id="ansBox" class="answer-box q-card"></div>
            </div>

            <footer class="footer" id="footer" style="display:none">
                <button class="btn btn-outline" onclick="prevQ()" id="prevBtn">← Trước</button>
                <button class="btn btn-primary" onclick="toggleAns()" id="ansBtn">💡 Xem đáp án</button>
                <button class="btn btn-primary" onclick="nextQ()" id="nextBtn">Tiếp theo →</button>
            </footer>
        </section>

        <!-- Cột 3 -->
        <section class="pdf-panel">
            <iframe id="pdfViewer" src="about:blank"></iframe>
        </section>
    </div>

    <script>
        let exams = [];
        let curExamIdx = -1;
        let curQIdx = 0;

        // Load dữ liệu
        fetch('./AppLuatSu/Resources/questions_data.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                exams = data;
                renderExams();
            });

        function renderExams() {
            const container = document.getElementById('examList');
            container.innerHTML = exams.map((ex, i) => `
                <div class="exam-item" id="ex-${i}" onclick="loadExam(${i})">
                    <div style="font-weight:600; font-size:0.9rem">${ex.title}</div>
                    <div style="font-size:0.75rem; color:#64748b">${ex.date} • ${ex.questions.length} câu</div>
                </div>
            `).join('');
        }

        function loadExam(i) {
            if (curExamIdx !== -1) document.getElementById(`ex-${curExamIdx}`).classList.remove('active');
            curExamIdx = i;
            document.getElementById(`ex-${i}`).classList.add('active');
            curQIdx = 0;
            document.getElementById('footer').style.display = 'flex';
            renderQuestion();
        }

        function renderQuestion() {
            const ex = exams[curExamIdx];
            const q = ex.questions[curQIdx];

            // Cập nhật Text
            document.getElementById('examTitle').innerText = ex.title;
            document.getElementById('qIndex').innerText = `Câu ${curQIdx+1}/${ex.questions.length}`;
            document.getElementById('progress').style.width = `${((curQIdx+1)/ex.questions.length)*100}%`;
            
            document.getElementById('qContent').innerHTML = `
                <h2 style="margin-bottom:15px">${q.title}</h2>
                <div style="font-size:1.1rem; line-height:1.7">${marked.parse(q.content)}</div>
            `;
            
            document.getElementById('ansBox').innerHTML = `
                <h3 style="color:#10b981; margin-bottom:10px">🎯 Gợi ý giải:</h3>
                <div style="font-size:1.05rem">${marked.parse(q.answer_guideline)}</div>
            `;
            document.getElementById('ansBox').style.display = 'none';
            document.getElementById('ansBtn').innerText = "💡 Xem đáp án";

            // Cập nhật PDF Preview
            const pdfUrl = `./data/${q.pdf_file}#page=${q.page}&view=FitH`;
            document.getElementById('pdfViewer').src = pdfUrl;

            // Điều hướng
            document.getElementById('prevBtn').style.visibility = curQIdx > 0 ? 'visible' : 'hidden';
            document.getElementById('nextBtn').innerText = curQIdx === ex.questions.length-1 ? "Hoàn thành" : "Tiếp theo →";
            
            document.querySelector('.scroll-area').scrollTop = 0;
        }

        function toggleAns() {
            const box = document.getElementById('ansBox');
            const btn = document.getElementById('ansBtn');
            if (box.style.display === 'none') {
                box.style.display = 'block';
                btn.innerText = "🙈 Ẩn đáp án";
                box.scrollIntoView({behavior: 'smooth', block: 'start'});
            } else {
                box.style.display = 'none';
                btn.innerText = "💡 Xem đáp án";
            }
        }

        function nextQ() {
            if (curQIdx < exams[curExamIdx].questions.length - 1) {
                curQIdx++;
                renderQuestion();
            } else {
                alert("Hoàn thành bộ đề!");
            }
        }

        function prevQ() {
            if (curQIdx > 0) {
                curQIdx--;
                renderQuestion();
            }
        }
    </script>
</body>
</html>
